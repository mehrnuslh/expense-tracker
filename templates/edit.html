<!DOCTYPE html>
<html>
<head><title>Edit Expense</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <h1>Edit Expense</h1>
    <form action="/update/{{ expense['id'] }}" method="POST">
        <input type="text" name="name" value="{{ expense['name'] }}" required>
        <input type="number" step="0.01" name="amount" value="{{ expense['amount'] }}" required>
        <input type="text" name="category" value="{{ expense['category'] }}" required>
        <input type="date" name="date" value="{{ expense['date'] }}" required>
        <button type="submit">Save</button>
    </form>
    <a href="/">Cancel</a>
</body>
</html>
